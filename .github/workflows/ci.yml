name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "file:./dev.db"
      SESSION_SECRET: "ci-only-secret-not-used-in-prod"
      APP_BASE_URL: "http://localhost:3300"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Typecheck
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
